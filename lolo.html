
<html>
<head>
  <meta charset="UTF-8">
  <title>For My Love</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #fff0f6;
      overflow-x: hidden;
    }
    section {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    /* Flower animation */
    .flower {
      width: 300px;
      height: 300px;
      background: pink;
      border-radius: 50%;
      animation: bloom 5s ease forwards;
    }
    @keyframes bloom {
      0% { transform: scale(0.1); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    /* Love message */
    .message {
      font-size: 3em;
      color: #d6336c;
      margin-top: 20px;
      opacity: 0;
      animation: fadeIn 3s ease forwards;
      animation-delay: 5s;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    /* Gallery */
    .gallery img, .gallery video {
      width: 80%;
      max-width: 600px;
      margin: 20px 0;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    /* Balloons */
    .balloon {
      position: fixed;
      bottom: -100px;
      width: 40px;
      height: 50px;
      background: red;
      border-radius: 50% 50% 50% 50%;
      animation: floatUp 10s linear infinite;
      z-index: 999;
    }
    @keyframes floatUp {
      0% { bottom: -100px; opacity: 0; }
      20% { opacity: 1; }
      100% { bottom: 110%; opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Background music -->
  <audio autoplay loop>
    <source src="congratulations.mp3" type="audio/mpeg">
  </audio>

  <!-- Flower intro -->
  <section>
    <div class="flower"></div>
    <div class="message">I love you so much ❤️</div>
  </section>

  <!-- Gallery -->
  <section class="gallery">
    <h2>Our Memories</h2>
    <!-- Replace with your own photos/videos -->
    <img src="photo1.jpg" alt="Memory 1">
    <img src="photo2.jpg" alt="Memory 2">
    <video controls src="video1.mp4"></video>
    <img src="photo3.jpg" alt="Memory 3">
  </section>

  <script>
    // Add heart balloons when scrolling past the flower section
    window.addEventListener('scroll', () => {
      if (window.scrollY > window.innerHeight / 2) {
        for (let i = 0; i < 5; i++) {
          let balloon = document.createElement('div');
          balloon.className = 'balloon';
          balloon.style.left = Math.random() * window.innerWidth + 'px';
          balloon.style.background = ['red','pink','purple'][Math.floor(Math.random()*3)];
          balloon.style.animationDuration = (6 + Math.random()*4) + 's';
          document.body.appendChild(balloon);
        }
      }
    });
  </script>
</body>
</html>
