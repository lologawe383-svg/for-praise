<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For My Love</title>
  <style>
    body {
      margin: 0;
      background: #fff0f6;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 100vh;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }
    .flower {
      position: relative;
      width: 200px;
      height: 200px;
    }
    .petal {
      position: absolute;
      width: 100px;
      height: 150px;
      background: pink;
      border-radius: 50% 50% 0 0;
      transform-origin: bottom center;
      opacity: 0;
    }
    .center {
      position: absolute;
      top: 75px;
      left: 75px;
      width: 50px;
      height: 50px;
      background: yellow;
      border-radius: 50%;
      z-index: 10;
      opacity: 0;
    }
    @keyframes bloom {
      from { transform: scale(0.1); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .message {
      font-size: 2.5em;
      color: #d6336c;
      margin-top: 20px;
      opacity: 0;
      animation: fadeIn 3s ease forwards;
      animation-delay: 3s;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    a {
      margin-top: 40px;
      font-size: 1.5em;
      text-decoration: none;
      color: #fff;
      background: #d6336c;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background 0.3s;
    }
    a:hover { background: #a61e4d; }
    /* Balloons */
    .balloon {
      position: fixed;
      bottom: -100px;
      width: 40px;
      height: 50px;
      background: red;
      border-radius: 50%;
      animation: floatUp 10s linear forwards;
      z-index: 999;
    }
    @keyframes floatUp {
      0% { bottom: -100px; opacity: 0; }
      20% { opacity: 1; }
      100% { bottom: 110%; opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Background music -->
  <audio autoplay loop>
    <source src="C:\Users\andil\Downloads\Mac Miller - Congratulations (feat. Bilal).mp3" type="audio/mpeg">
  </audio>

  <!-- Flower intro -->
  <div class="flower">
    <div class="petal" style="transform: rotate(0deg) translateY(-50px); animation: bloom 2s forwards;"></div>
    <div class="petal" style="transform: rotate(60deg) translateY(-50px); animation: bloom 2s forwards 0.5s;"></div>
    <div class="petal" style="transform: rotate(120deg) translateY(-50px); animation: bloom 2s forwards 1s;"></div>
    <div class="petal" style="transform: rotate(180deg) translateY(-50px); animation: bloom 2s forwards 1.5s;"></div>
    <div class="petal" style="transform: rotate(240deg) translateY(-50px); animation: bloom 2s forwards 2s;"></div>
    <div class="petal" style="transform: rotate(300deg) translateY(-50px); animation: bloom 2s forwards 2.5s;"></div>
    <div class="center" style="animation: bloom 2s forwards 3s;"></div>
  </div>
  <div class="message" id="loveMessage">I love you so much ❤️</div>

  <!-- Link to memories page -->
  <a href="memories.html">See Our Memories</a>

  <script>
    // Trigger balloons after message appears
    setTimeout(() => {
      for (let i = 0; i < 10; i++) {
        let balloon = document.createElement('div');
        balloon.className = 'balloon';
        balloon.style.left = Math.random() * window.innerWidth + 'px';
        balloon.style.background = ['red','pink','purple'][Math.floor(Math.random()*3)];
        balloon.style.animationDuration = (6 + Math.random()*4) + 's';
        document.body.appendChild(balloon);
        setTimeout(() => balloon.remove(), 10000);
      }
    }, 6000); // wait until after message fade-in
  </script>
</body>
</html>
